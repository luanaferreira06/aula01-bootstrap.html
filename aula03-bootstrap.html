<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>aula03 - grid bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>

    <div class="container py-4 bg-warning">
        <h2 class="mb-3">grid com 3 colunas</h2>
        <div class="row">
            <div class="col p-3 border">coluna 1</div>
            <div class="col p-3 border">coluna 2</div>
            <div class="col p-3 border">coluna 3</div>
        </div>
    </div>

    <div class="mb-4"></div>

    <div class="container py-4 bg-primary">
        <h4 class="mb-4 text-white"> exemplo de colunas (soma sempre<= 12)</h4>

        <div class="row mb-3 ">
            <div class="col-12 box text-white border">col-12(100% da largura)</div>
        </div>

        <div class="row mb-3">
            <div class="col-6 box text-white border">col-6(50%)</div>
            <div class="col-6 box text-white border">col-6(50%)</div>
        </div>
        
        <div class="row mb-3">
            <div class="col-4 box text-white border">col-4(33%)</div>
            <div class="col-4 box text-white border">col-4(33%)</div>
            <div class="col-4 box text-white border">col-4(33%)</div>
        </div>

        <div class="row mb-3">
            <div class="col-3 box text-white border">col-3(25%)</div>
            <div class="col-3 box text-white border">col-3(25%)</div>
            <div class="col-3 box text-white border">col-3(25%)</div>
            <div class="col-3 box text-white border">col-3(25%)</div>
        </div>
    </div>



   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
